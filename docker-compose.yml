services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    # ❌ removed port (Coolify should expose it)
    ports:
      - '5679:5679'
    volumes:
      - ./data:/app/data
    env_file:
      - ./.env
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    # ❌ no ports (internal only)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"  # keep for now (web access)
    volumes:
      - n8n_data:/home/node/.n8n
    env_file:
      - ./.env
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
    command: ["start"]  # ❌ removed --tunnel
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"  # keep for browser access
    env_file:
      - ./.env
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
